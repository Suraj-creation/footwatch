openapi: 3.0.3
info:
  title: FootWatch Backend API
  version: 0.1.0
servers:
  - url: http://localhost:8000
paths:
  /detect-violation:
    post:
      summary: Detect violation and auto-generate challan
      responses:
        '201':
          description: Challan generated
  /generate-challan:
    post:
      summary: Generate challan from provided extracted metadata
      responses:
        '201':
          description: Challan generated
  /v1/telemetry:
    post:
      summary: Ingest live camera telemetry
      responses:
        '200':
          description: Accepted
  /v1/violations:
    post:
      summary: Ingest confirmed violation metadata
      responses:
        '201':
          description: Queued
    get:
      summary: List violations
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: camera_id
          in: query
          required: false
          schema:
            type: string
        - name: plate
          in: query
          required: false
          schema:
            type: string
        - name: class
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
        - name: to
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Violation list
  /v1/violations/summary:
    get:
      summary: Get aggregate dashboard metrics
      responses:
        '200':
          description: Violation summary
  /v1/alerts:
    get:
      summary: List recent system alerts
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Alert list
  /v1/violations/{id}:
    get:
      summary: Get violation details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Violation record
  /v1/violations/{id}/evidence-complete:
    post:
      summary: Mark evidence upload completion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evidence completion accepted
  /v1/violations/{id}/evidence-url:
    get:
      summary: Get signed evidence URL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Signed URL
  /v1/live/cameras:
    get:
      summary: List live camera states
      responses:
        '200':
          description: Camera state list
  /challans:
    get:
      summary: List challans with filters
      parameters:
        - name: plate_number
          in: query
          schema:
            type: string
        - name: challan_id
          in: query
          schema:
            type: string
        - name: violation_type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Challan list
  /challan/{id}:
    get:
      summary: Get challan details by challan id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Challan details
